[paths]
# Base directories (trailing slash recommended).
xsf_dir = "/usr/scratch/bucaramanga/awinka/MoS2/principle_unit_cell/wannier/no_gw_opt_no_symmetry/"
npy_dir = "/usr/scratch/bucaramanga/awinka/MoS2/principle_unit_cell/wannier/no_gw_opt_no_symmetry/np_files/"

# Prefix added in the script before globbing:
seedname = "wannier90"
npy_prefix = "wannier"

[output]
save_dir = "/usr/scratch/bucaramanga/awinka/MoS2/principle_unit_cell/wannier/no_gw_opt_no_symmetry/coulomb_matrix_17x17/"
matrix_filename = "V_ijij.npy"
input_parameters_filename = "input_parameters.txt"
use_unique_filenames = true

[interaction]
# Neighbor interaction range in unit-cell steps.
Rx = 8
Ry = 8
Rz = 0

[mpi]
# Number of Poisson pools for MPI distribution.
number_poisson_pools = 1

[runtime]
# Debug checks for rank/Wannier index distribution.
perform_checks = false

# GPAW warning in script suggests OMP_NUM_THREADS=1.
omp_num_threads = 1

[io]
# Patterns used to collect Wannier files.
xsf_glob = "*.xsf"
npy_glob = "*.npy"
